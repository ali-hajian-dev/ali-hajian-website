<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>وبلاگ | علی حاجیان</title>
<meta name="description" content="آخرین مطالب، پروژه‌ها و تجربیات علی حاجیان در حوزه خدمات دیجیتال"/>
<link rel="canonical" href="https://alihajian.ir/blog.html"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080F;--card:#0F1628;--card2:#141C2B;
  --violet:#8B6EF5;--violet2:#6448D4;--cyan:#2DE8D0;
  --text:#EDF0FA;--muted:#6B7591;--muted2:#9BA5BE;
  --border:rgba(139,110,245,.14);--border2:rgba(139,110,245,.28);
}
html{scroll-behavior:smooth}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

nav{position:sticky;top:0;z-index:100;padding:14px 5%;display:flex;justify-content:space-between;align-items:center;background:rgba(6,8,15,.75);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{font-weight:900;font-size:1.1rem;background:linear-gradient(135deg,var(--violet),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.nav-links{display:flex;gap:6px;list-style:none}
.nav-links a{color:var(--muted2);text-decoration:none;font-size:.87rem;padding:7px 15px;border-radius:10px;transition:all .2s}
.nav-links a:hover,.nav-links a.active{color:var(--text);background:rgba(139,110,245,.12)}

.blog-hero{padding:80px 5% 60px;text-align:center;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(139,110,245,.07) 0%,transparent 70%)}
.blog-hero h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;letter-spacing:-.04em;margin-bottom:14px}
.blog-hero h1 span{background:linear-gradient(135deg,var(--violet),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.blog-hero p{color:var(--muted2);font-size:.97rem;max-width:480px;margin:0 auto}

.filters{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:0 5% 48px}
.filter-pill{padding:8px 20px;border-radius:100px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted2);font-family:inherit;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .22s}
.filter-pill:hover,.filter-pill.active{background:rgba(139,110,245,.15);border-color:var(--border2);color:var(--text)}

.blog-grid{max-width:1060px;margin:0 auto;padding:0 5% 100px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px}

.post-card{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:22px;padding:30px 26px;cursor:pointer;transition:all .32s cubic-bezier(.25,.8,.25,1);display:flex;flex-direction:column;gap:14px}
.post-card:hover{transform:translateY(-6px);border-color:var(--border2);box-shadow:0 22px 55px rgba(0,0,0,.4)}
.post-cat{display:inline-block;font-size:.7rem;font-weight:700;padding:4px 13px;border-radius:100px;background:rgba(139,110,245,.12);border:1px solid rgba(139,110,245,.22);color:var(--violet);width:fit-content}
.post-card h2{font-size:1.05rem;font-weight:700;line-height:1.4}
.post-summary{color:var(--muted2);font-size:.86rem;line-height:1.7;flex:1}
.post-footer{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.post-date{color:var(--muted);font-size:.76rem}
.read-more{color:var(--violet);font-size:.8rem;font-weight:600}

.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--violet);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{grid-column:1/-1;text-align:center;padding:80px 0}

.empty{text-align:center;padding:80px 20px;color:var(--muted);grid-column:1/-1}
.empty .emoji{font-size:3rem;margin-bottom:16px}

.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);display:none;align-items:flex-start;justify-content:center;padding:60px 16px 40px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:44px 40px;width:100%;max-width:680px;position:relative}
.modal-close{position:absolute;top:18px;left:18px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--muted2);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:rgba(255,255,255,.14);color:var(--text)}
.modal-cat-badge{display:inline-block;font-size:.72rem;font-weight:700;padding:4px 13px;border-radius:100px;background:rgba(139,110,245,.12);border:1px solid rgba(139,110,245,.22);color:var(--violet);margin-bottom:16px}
.modal h2{font-size:1.5rem;font-weight:900;letter-spacing:-.03em;margin-bottom:10px;line-height:1.3}
.modal-date{color:var(--muted);font-size:.78rem;margin-bottom:28px}
.modal-content{color:var(--muted2);line-height:1.9;font-size:.95rem;white-space:pre-wrap}

footer{border-top:1px solid var(--border);padding:26px 5%;text-align:center;color:var(--muted);font-size:.8rem}
footer a{color:var(--violet);text-decoration:none}

@media(max-width:600px){
  .modal{padding:32px 20px}
  .nav-links a{padding:6px 10px;font-size:.8rem}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">علی حاجیان</a>
  <ul class="nav-links">
    <li><a href="index.html">خانه</a></li>
    <li><a href="index.html#services">خدمات</a></li>
    <li><a href="blog.html" class="active">وبلاگ</a></li>
    <li><a href="index.html#contact">تماس</a></li>
  </ul>
</nav>

<section class="blog-hero">
  <h1>وبلاگ <span>علی حاجیان</span></h1>
  <p>آخرین مطالب، پروژه‌ها و تجربیاتم در حوزه فناوری و خدمات دیجیتال</p>
</section>

<div class="filters" id="filters">
  <button class="filter-pill active" data-cat="همه">همه</button>
  <button class="filter-pill" data-cat="ربات‌سازی">ربات‌سازی</button>
  <button class="filter-pill" data-cat="پردازش صدا">پردازش صدا</button>
  <button class="filter-pill" data-cat="تولید محتوا">تولید محتوا</button>
  <button class="filter-pill" data-cat="طراحی">طراحی</button>
  <button class="filter-pill" data-cat="موزیک">موزیک</button>
  <button class="filter-pill" data-cat="فناوری">فناوری</button>
  <button class="filter-pill" data-cat="پروژه">پروژه</button>
</div>

<div class="blog-grid" id="blog-grid">
  <div class="loading-wrap"><span class="spinner"></span></div>
</div>

<div class="modal-overlay" id="post-modal">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-cat-badge" id="m-cat"></div>
    <h2 id="m-title"></h2>
    <div class="modal-date" id="m-date"></div>
    <div class="modal-content" id="m-content"></div>
  </div>
</div>

<footer>
  <p>نوشته‌های <a href="index.html">علی حاجیان</a> | تماس از طریق بله: @ali_1391_11_12_IRAN</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, query, where, orderBy
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAMr_bLGfmYGWmhOqXw85rKDPcTH9tWdcU",
  authDomain: "baleai-fc659.firebaseapp.com",
  projectId: "baleai-fc659",
  storageBucket: "baleai-fc659.firebasestorage.app",
  messagingSenderId: "538263689154",
  appId: "1:538263689154:web:d8d4fc393b18b43349685b"
});
const db = getFirestore(app);

let allPosts   = [];
let currentCat = 'همه';

// ── Load ──
async function loadPosts(){
  const q = query(
    collection(db,'posts'),
    where('status','==','published'),
    orderBy('createdAt','desc')
  );
  const snap = await getDocs(q);
  allPosts = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderGrid();
}

// ── Render ──
function renderGrid(){
  const posts = currentCat==='همه' ? allPosts : allPosts.filter(p=>p.cat===currentCat);
  const el = document.getElementById('blog-grid');
  if(!posts.length){
    el.innerHTML=`<div class="empty"><div class="emoji">📭</div><p>هنوز پستی در این دسته منتشر نشده</p></div>`;
    return;
  }
  el.innerHTML = posts.map(p=>`
    <article class="post-card" data-id="${p.id}" role="button" tabindex="0" aria-label="${p.title}">
      <span class="post-cat">${p.cat}</span>
      <h2>${p.title}</h2>
      <p class="post-summary">${p.summary||p.content.substring(0,120)+'...'}</p>
      <div class="post-footer">
        <span class="post-date">${p.date||''}</span>
        <span class="read-more">ادامه مطلب ←</span>
      </div>
    </article>`).join('');

  el.querySelectorAll('.post-card').forEach(card=>{
    card.addEventListener('click',()=>openPost(card.dataset.id));
    card.addEventListener('keydown',e=>{ if(e.key==='Enter') openPost(card.dataset.id); });
  });
}

// ── Filter ──
document.querySelectorAll('.filter-pill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderGrid();
  });
});

// ── Modal ──
function openPost(id){
  const p = allPosts.find(x=>x.id===id);
  if(!p) return;
  document.getElementById('m-cat').textContent     = p.cat;
  document.getElementById('m-title').textContent   = p.title;
  document.getElementById('m-date').textContent    = p.date||'';
  document.getElementById('m-content').textContent = p.content;
  document.getElementById('post-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closePost(){
  document.getElementById('post-modal').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('modal-close').addEventListener('click',closePost);
document.getElementById('post-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closePost(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePost(); });

loadPosts();
</script>
</body>
</html>
